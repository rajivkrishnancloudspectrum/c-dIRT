<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Lucy Support - Full Screen</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="loadingOverlay" class="immersive-welcome">
        <div class="immersive-welcome-content">
            <div class="loading-spinner"></div>
            <h1>Connecting to Lucy...</h1>
            <p>Setting up your secure session.</p>
        </div>
    </div>

    <div id="chatContainer"></div>

    <script type='text/javascript'>
        function initEmbeddedMessaging() {
            try {
                embeddedservice_bootstrap.settings.language = 'en_US';
                embeddedservice_bootstrap.settings.hideChatButton = true; 

                embeddedservice_bootstrap.init(
                    '00DTA00000B1e6j',
                    'Web_AI_Agent_V2',
                    'https://charlesdean--partialcop.sandbox.my.site.com/ESWWebAIAgentV21769435828034',
                    {
                        scrt2URL: 'https://charlesdean--partialcop.sandbox.my.salesforce-scrt.com'
                    }
                );

                // FIX: Use 'onEmbeddedMessagingConversationButtonCreated' 
                // This ensures the API is actually ready to be called.
                window.addEventListener("onEmbeddedMessagingConversationButtonCreated", () => {
                    console.log("MIAW Engine Ready. Launching...");
                    
                    // Small delay to ensure the utilAPI is fully mapped
                    setTimeout(() => {
                        embeddedservice_bootstrap.utilAPI.launchChat()
                            .then(() => {
                                console.log("Chat Launched.");
                                setupFullPageUI();
                            })
                            .catch((err) => {
                                console.error("Launch failed:", err);
                            });
                    }, 200);
                });

            } catch (err) {
                console.error('Error loading Embedded Messaging: ', err);
            }
        };

        function setupFullPageUI() {
            // Salesforce MIAW components often live in the Shadow DOM or root.
            // We look for the main container class.
            const sfFrame = document.querySelector('.embeddedMessagingFrame');
            const loader = document.getElementById('loadingOverlay');
            
            if (sfFrame) {
                sfFrame.classList.add('chat-ready');
                
                // Fade out the loader
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            } else {
                // If the frame hasn't rendered yet, check again in 100ms
                setTimeout(setupFullPageUI, 100);
            }
        }
    </script>

    <script type='text/javascript' 
            src='https://charlesdean--partialcop.sandbox.my.site.com/ESWWebAIAgentV21769435828034/assets/js/bootstrap.min.js' 
            onload='initEmbeddedMessaging()'>
    </script>
</body>
</html>
