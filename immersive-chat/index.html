<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Charles & Dean Finance Assistant</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- V1: Static landing page -->
    <div id="v1-landing">
        <div id="chat-container">
            <div class="title">Charles &amp; Dean Finance Assistant</div>
            <div class="subtitle">Ask anything about vehicle finance, eligibility or applications</div>

            <div class="input-wrapper">
                <input type="text" id="chatInput" class="chat-input" placeholder="Ask about vehicle finance..." />
                <button id="sendBtn" class="send-btn">Send</button>
            </div>

            <div class="quick-options">
                <button class="quick-btn" data-msg="Need vehicle finance help">Need vehicle finance help</button>
                <button class="quick-btn" data-msg="Check my eligibility">Check my eligibility</button>
                <button class="quick-btn" data-msg="Help me choose the right vehicle finance option">Help me choose a plan</button>
                <button class="quick-btn" data-msg="I want to apply for vehicle finance">Start application</button>
            </div>
        </div>
    </div>

    <!-- V2: Full-screen chat container — SF iframe renders inside here -->
    <div id="embeddedMessagingContainer"></div>

    <script>
        // ── State ──────────────────────────────────────────────
        let pendingMessage = null;
        let botGreetingSeen = false;

        // ── V1 → V2 transition ────────────────────────────────
        function showV2() {
            document.getElementById('v1-landing').style.display = 'none';
            document.getElementById('embeddedMessagingContainer').classList.add('show');
        }

        function showV1() {
            document.getElementById('embeddedMessagingContainer').classList.remove('show');
            document.getElementById('v1-landing').style.display = 'flex';
        }

        // ── Launch chat from V1 ───────────────────────────────
        function launchChatWithMessage(message) {
            if (message) {
                console.log('📝 Captured message:', message);
                pendingMessage = message;
                botGreetingSeen = false;
            }
            showV2();
            embeddedservice_bootstrap.utilAPI.launchChat()
                .then(() => console.log('✅ Chat launched'))
                .catch(err => console.error('❌ launchChat failed:', err));
        }

        // ── SF: Ready → set targetElement so iframe renders inside our container ──
        window.addEventListener('onEmbeddedMessagingReady', () => {
            console.log('✅ Embedded Messaging Ready');

            // ✅ Key: tell SF to render inside our container, not floating freely
            embeddedservice_bootstrap.settings.targetElement =
                document.body.querySelector('#embeddedMessagingContainer');

            // ── Conversation opened ───────────────────────────
            window.addEventListener('onEmbeddedMessagingConversationOpened', () => {
                console.log('💬 Conversation opened');
            });

            // ── Participant changed → chatbot joined → send message ──
            // ✅ Key pattern from reference code: check role === "Chatbot" + operation === "add"
            window.addEventListener('onEmbeddedMessagingConversationParticipantChanged', (event) => {
                const rawPayload = event.detail?.conversationEntry?.entryPayload;
                if (!rawPayload) return;

                const parsed = JSON.parse(rawPayload);
                const entry = parsed.entries?.[0];

                console.log('👥 Participant:', entry?.participant?.role, '| Op:', entry?.operation);

                if (
                    entry?.operation === 'add' &&
                    entry?.participant?.role === 'Chatbot' &&
                    pendingMessage &&
                    !botGreetingSeen
                ) {
                    botGreetingSeen = true;
                    console.log('🤖 Chatbot joined — sending in 1.5s:', pendingMessage);

                    setTimeout(() => {
                        if (pendingMessage) {
                            embeddedservice_bootstrap.utilAPI.sendTextMessage(pendingMessage);
                            console.log('📡 Message sent:', pendingMessage);
                            pendingMessage = null;
                        }
                    }, 1500);
                }
            });

            // ── Window closed → back to V1 ────────────────────
            window.addEventListener('onEmbeddedMessagingWindowClosed', () => {
                console.log('🔒 Chat closed — returning to V1');
                pendingMessage = null;
                botGreetingSeen = false;
                showV1();
            });

            // ── Window minimized → show V1 underneath ─────────
            window.addEventListener('onEmbeddedMessagingWindowMinimized', () => {
                console.log('➖ Chat minimized');
                showV1();
            });
        });

        // ── SF: Button created → hide FAB via API + DOM poll ──
        window.addEventListener('onEmbeddedMessagingButtonCreated', () => {
            console.log('🔔 Button created — hiding FAB');

            // Hide via official API
            embeddedservice_bootstrap.utilAPI.hideChatButton();

            // Also poll DOM to catch shadow-rendered button elements
            const pollHideFAB = setInterval(() => {
                const selectors = [
                    '.embeddedMessagingConversationButton',
                    '.embeddedMessagingConversationButtonContainer',
                    '#embeddedMessagingConversationButton',
                    'button[data-type="fab"]'
                ];
                selectors.forEach(sel => {
                    document.querySelectorAll(sel).forEach(el => {
                        el.style.setProperty('display', 'none', 'important');
                        el.style.setProperty('visibility', 'hidden', 'important');
                        el.style.setProperty('opacity', '0', 'important');
                        el.style.setProperty('pointer-events', 'none', 'important');
                    });
                });
            }, 300);

            // Stop polling after 10s — button should be gone by then
            setTimeout(() => clearInterval(pollHideFAB), 10000);
        });

        // ── V1 UI events ──────────────────────────────────────
        document.addEventListener('DOMContentLoaded', () => {
            const sendBtn = document.getElementById('sendBtn');
            const chatInput = document.getElementById('chatInput');

            sendBtn.addEventListener('click', () => {
                const msg = chatInput.value.trim();
                if (msg) {
                    chatInput.value = '';
                    launchChatWithMessage(msg);
                }
            });

            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendBtn.click();
            });

            document.querySelectorAll('.quick-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    launchChatWithMessage(btn.dataset.msg);
                });
            });
        });

        // ── SF Init ───────────────────────────────────────────
        function initEmbeddedMessaging() {
            try {
                embeddedservice_bootstrap.settings.language = 'en_US';
                embeddedservice_bootstrap.init(
                    '00DTA00000B1e6j',
                    'Web_AI_Agent_V2',
                    'https://charlesdean--partialcop.sandbox.my.site.com/ESWWebAIAgentV21769435828034',
                    {
                        scrt2URL: 'https://charlesdean--partialcop.sandbox.my.salesforce-scrt.com'
                    }
                );
            } catch (err) {
                console.error('❌ SF Init Error:', err);
            }
        }
    </script>

    <script
        src='https://charlesdean--partialcop.sandbox.my.site.com/ESWWebAIAgentV21769435828034/assets/js/bootstrap.min.js'
        onload='initEmbeddedMessaging()'>
    </script>

</body>
</html>
