<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Lucy Chat Full Screen</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #fff;
        }

        /* Hide FAB button */
        .embeddedMessagingConversationButton,
        .embeddedMessagingConversationButtonContainer {
            display: none !important;
        }

        /* Force iframe full screen */
        .embeddedMessagingFrame {
            position: fixed !important;
            inset: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            max-width: 100% !important;
            max-height: 100% !important;
            margin: 0 !important;
            border: none !important;
            border-radius: 0 !important;
            box-shadow: none !important;
        }
    </style>
</head>
<body>

    <!-- NO wrapper div — it was sitting on top of the iframe blocking all input -->

    <script type='text/javascript'>

        window.addEventListener('onEmbeddedMessagingButtonCreated', () => {
            embeddedservice_bootstrap.utilAPI.hideChatButton();
            embeddedservice_bootstrap.utilAPI.launchChat()
                .then(() => console.log('Chat launched successfully'))
                .catch(err => console.error('launchChat failed:', err));
        });

        function initEmbeddedMessaging() {
            try {
                embeddedservice_bootstrap.settings.language = 'en_US';
                embeddedservice_bootstrap.init(
                    '00DTA00000B1e6j',
                    'Web_AI_Agent_V2',
                    'https://charlesdean--partialcop.sandbox.my.site.com/ESWWebAIAgentV21769435828034',
                    {
                        scrt2URL: 'https://charlesdean--partialcop.sandbox.my.salesforce-scrt.com'
                    }
                );
            } catch (err) {
                console.error('Initialization Error:', err);
            }
        }

    </script>

    <script type='text/javascript'
            src='https://charlesdean--partialcop.sandbox.my.site.com/ESWWebAIAgentV21769435828034/assets/js/bootstrap.min.js'
            onload='initEmbeddedMessaging()'>
    </script>

</body>
</html>
