<!DOCTYPE html>
<html>
<head>
  <title>Immersive Chat</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>🤖 AI Support (Immersive)</header>

<div id="chatContainer"></div>

<!-- ✅ Your JS logic -->
<script>
  // Salesforce Ready Event
  window.addEventListener("onEmbeddedMessagingReady", () => {
    console.log("✅ Salesforce Ready Event Fired");

    const api = window.embeddedservice_bootstrap?.utilAPI;

    if (api) {
      console.log("🚀 Launching Chat");
      api.launchChat();

      setTimeout(moveChat, 1200);
    }
  });

  function moveChat() {
    const container = document.getElementById("chatContainer");

    const frame =
      document.querySelector("iframe.embeddedMessagingFrame") ||
      document.querySelector("iframe");

    if (frame && container) {
      console.log("✅ Moving chat into container");

      container.appendChild(frame);

      setTimeout(() => {
        frame.classList.add("chat-ready");
      }, 100);

    } else {
      console.log("⏳ Retrying iframe...");
      setTimeout(moveChat, 500);
    }
  }
</script>

<!-- ✅ Salesforce Init -->
<script>
  function initEmbeddedMessaging() {
    try {
      embeddedservice_bootstrap.settings.language = 'en_US';
      embeddedservice_bootstrap.settings.hideChatButton = true;

      embeddedservice_bootstrap.init(
        '00DTA00000B1e6j',
        'Web_AI_Agent_V2',
        'https://charlesdean--partialcop.sandbox.my.site.com/ESWWebAIAgentV21769435828034',
        {
          scrt2URL: 'https://charlesdean--partialcop.sandbox.my.salesforce-scrt.com'
        }
      );

    } catch (err) {
      console.error('Error loading Embedded Messaging: ', err);
    }
  }
</script>

<!-- ✅ Load Salesforce script LAST -->
<script
  src="https://charlesdean--partialcop.sandbox.my.site.com/ESWWebAIAgentV21769435828034/assets/js/bootstrap.min.js"
  onload="initEmbeddedMessaging()">
</script>

</body>
</html>
