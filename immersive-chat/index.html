<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Lucy Chat Full Screen</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="chatContainer"></div>

    <script type='text/javascript'>
        function initEmbeddedMessaging() {
            try {
                embeddedservice_bootstrap.settings.language = 'en_US';

                // ✅ Correct setting to hide the FAB button on load
                embeddedservice_bootstrap.settings.hideChatButtonOnLoad = true;

                embeddedservice_bootstrap.init(
                    '00DTA00000B1e6j',
                    'Web_AI_Agent_V2',
                    'https://charlesdean--partialcop.sandbox.my.site.com/ESWWebAIAgentV21769435828034',
                    {
                        scrt2URL: 'https://charlesdean--partialcop.sandbox.my.salesforce-scrt.com'
                    }
                );

            } catch (err) {
                console.error('Initialization Error:', err);
            }
        }

        // ✅ Auto-launch using the official event — fires when the API is ready
        window.addEventListener('onEmbeddedMessagingReady', () => {
            console.log('Embedded Messaging Ready — launching chat...');
            embeddedservice_bootstrap.utilAPI.launchChat()
                .then(() => console.log('Chat launched successfully'))
                .catch(err => console.error('launchChat failed:', err));
        });
    </script>

    <script type='text/javascript'
            src='https://charlesdean--partialcop.sandbox.my.site.com/ESWWebAIAgentV21769435828034/assets/js/bootstrap.min.js'
            onload='initEmbeddedMessaging()'>
    </script>

</body>
</html>
