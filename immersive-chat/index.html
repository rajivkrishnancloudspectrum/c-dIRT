<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucy Support - Full Screen Chat</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="immersive-chat-page">

    <div id="loadingOverlay" class="immersive-welcome">
        <div class="immersive-welcome-content">
            <div class="loading-spinner"></div>
            <h1>Connecting to Lucy...</h1>
            <p>Please wait while we prepare your secure session.</p>
        </div>
    </div>

    <div class="immersive-container" id="chatContainer"></div>

    <script type='text/javascript'>
        function initEmbeddedMessaging() {
            try {
                embeddedservice_bootstrap.settings.language = 'en_US';
                embeddedservice_bootstrap.settings.hideChatButton = true; // Hide the small bubble

                embeddedservice_bootstrap.init(
                    '00DTA00000B1e6j',
                    'Web_AI_Agent_V2',
                    'https://charlesdean--partialcop.sandbox.my.site.com/ESWWebAIAgentV21769435828034',
                    {
                        scrt2URL: 'https://charlesdean--partialcop.sandbox.my.salesforce-scrt.com'
                    }
                );

                // Auto-launch loop
                let interval = setInterval(() => {
                    if (embeddedservice_bootstrap.utilAPI) {
                        embeddedservice_bootstrap.utilAPI.launchChat()
                            .then(() => {
                                clearInterval(interval);
                                setupUI();
                            })
                            .catch(() => { /* Retry until ready */ });
                    }
                }, 200);

            } catch (err) {
                console.error('Error loading Embedded Messaging: ', err);
            }
        };

        function setupUI() {
            // Find the Salesforce element and move it into our container
            const chatElement = document.querySelector('.embeddedMessagingFrame') || 
                                document.querySelector('.embeddedServiceSidebar');
            
            if (chatElement) {
                document.getElementById('chatContainer').appendChild(chatElement);
                document.getElementById('loadingOverlay').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loadingOverlay').style.display = 'none';
                    chatElement.classList.add('chat-ready');
                }, 500);
            }
        }
    </script>

    <script type='text/javascript' 
            src='https://charlesdean--partialcop.sandbox.my.site.com/ESWWebAIAgentV21769435828034/assets/js/bootstrap.min.js' 
            onload='initEmbeddedMessaging()'>
    </script>
</body>
</html>
